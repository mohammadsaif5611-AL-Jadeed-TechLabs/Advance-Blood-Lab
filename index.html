<script>
    /* ===== FORCE UPPERCASE ===== */
 
  /* ===== NUMBER ONLY ===== */
  function onlyNumber(el) {
    el.value = el.value.replace(/[^0-9]/g, "");
  }


  function toUpperCaseInput(el) {
    el.value = el.value.toUpperCase();
  }


function updateNameAndSex() {
  const prefix = document.getElementById("prefix")?.value || "";
  const nameInput = document.getElementById("patient_name");
  const sexSelect = document.getElementById("sex");

  if (!nameInput || !sexSelect) return;

  // Remove ANY existing prefix
  let name = nameInput.value.toUpperCase();
  name = name.replace(
    /^(MR\.|MASTER\.|MRS\.|MISS\.|BABY\/MISS\.|BABY\/OF\.)\s*/g,
    ""
  );

  // Add selected prefix
  nameInput.value = `${prefix} ${name}`.trim();

  // Auto sex logic
  const malePrefixes = ["MR.", "MASTER.", "BABY/OF."];
  const femalePrefixes = ["MRS.", "MISS.", "BABY/MISS."];

  if (malePrefixes.includes(prefix)) {
    sexSelect.value = "Male";
  } else if (femalePrefixes.includes(prefix)) {
    sexSelect.value = "Female";
  }
}



function createTestCard(testName) {
  const div = document.createElement("div");
  div.className = "test-item";
  div.innerText = testName;

  div.addEventListener("click", () => {
    div.classList.toggle("active");
  });

  return div;
}

  // Auto set date
  document.addEventListener("DOMContentLoaded", () => {
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("date").value = today;

    // Run once on load
    updateNameAndSex();
  });
</script>
<script type="module">
  import { supabase } from "./js/supabase.js";

async function showLicenceAlert() {
  const { data: sessionData } = await supabase.auth.getSession();
  if (!sessionData.session) return;

  const userId = sessionData.session.user.id;

  const { data: licence, error } = await supabase
    .from("user_licence")
    .select("expiry_date")
    .eq("user_id", userId)
    .single();

  if (error || !licence) return;

  const expiry = new Date(licence.expiry_date);

  const card = document.getElementById("subscriptionCard");
  const text = document.getElementById("subscriptionText");

  card.style.display = "block";

function updateCountdown() {
  const now = new Date();
  let diff = expiry - now;

  if (diff <= 0) {
    text.innerText = "⚠️ Subscription has expired.";
    return;
  }

  // Total seconds
  let totalSeconds = Math.floor(diff / 1000);

  const seconds = totalSeconds % 60;
  totalSeconds = Math.floor(totalSeconds / 60);

  const minutes = totalSeconds % 60;
  totalSeconds = Math.floor(totalSeconds / 60);

  const hours = totalSeconds % 24;
  let totalDays = Math.floor(totalSeconds / 24);

  const years = Math.floor(totalDays / 365);
  totalDays %= 365;

  const months = Math.floor(totalDays / 30);
  const days = totalDays % 30;

  let display = "Subscription valid for ";

  if (years >= 1) {
    display += `${years} Yr `;
    if (months > 0) display += `${months} Mo `;
    if (days > 0) display += `${days} D `;
  }
  else if (months >= 1) {
    display += `${months} Mo `;
    if (days > 0) display += `${days} D `;
  }
  else {
    display += `${days} D `;
  }

  display += `${hours}h ${minutes}m ${seconds}s`;

  text.innerText = display.trim();
}



  // Run immediately
  updateCountdown();

  // Update every second
  setInterval(updateCountdown, 1000);

  /* ===== LAST 3 DAYS ALERT ===== */
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const expiryDate = new Date(licence.expiry_date);
  expiryDate.setHours(0, 0, 0, 0);

  const diffMs = expiryDate - today;
  const daysLeft = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

if (daysLeft > 0 && daysLeft <= 3) {
  alert(
    `⚠️ Subscription expires soon in ${daysLeft} day(s).\n` +
    `Please contact Aljadeed Tech Labs.`
  );
}

}



  document.addEventListener("DOMContentLoaded", showLicenceAlert);
</script>

<script type="module">
  import { supabase } from "./js/supabase.js";

  async function showLabName() {
    const { data: sessionData } = await supabase.auth.getSession();
    if (!sessionData.session) return;

    const userId = sessionData.session.user.id;

    const { data: user } = await supabase
      .from("users")
      .select("lab_name")
      .eq("id", userId)
      .maybeSingle();

    if (user) {
      document.getElementById("labNameText").innerText =
        user.lab_name.toUpperCase();
    }
  }

  document.addEventListener("DOMContentLoaded", showLabName);
</script>
